<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crime Vocab">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>Crime Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0f0f0f;
  --surface: #1c1c1e;
  --surface2: #2c2c2e;
  --border: rgba(255,255,255,0.1);
  --text: #f5f5f0;
  --text2: rgba(245,245,240,0.55);
  --text3: rgba(245,245,240,0.3);
  --accent: #d4a853;
  --accent-dim: rgba(212,168,83,0.12);
  --green: #4cd964;
  --green-dim: rgba(76,217,100,0.12);
  --red: #ff453a;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  touch-action: pan-y;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: env(safe-area-inset-top, 12px) 20px 0;
  background: var(--bg);
}
.header-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0 10px;
  border-bottom: 0.5px solid var(--border);
}
.app-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 500;
  color: var(--text);
  letter-spacing: -0.3px;
}
.app-title em { color: var(--accent); font-style: italic; }

.counter {
  font-size: 14px; color: var(--text2); font-weight: 400;
}
.counter b { color: var(--text); font-weight: 500; }

/* ── PROGRESS ── */
.progress-wrap {
  height: 3px; background: var(--surface2); margin-top: 10px;
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}

/* ── FILTER TABS ── */
.filters {
  display: flex; gap: 8px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding: 10px 0 0;
}
.filters::-webkit-scrollbar { display: none; }
.ftab {
  flex-shrink: 0; font-size: 12px; font-weight: 400;
  font-family: 'DM Sans', sans-serif;
  padding: 6px 16px; border-radius: 20px;
  border: 0.5px solid var(--border);
  background: transparent; color: var(--text2);
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
}
.ftab.active {
  background: var(--accent-dim);
  border-color: rgba(212,168,83,0.4);
  color: var(--accent);
}

/* ── CARD AREA ── */
.card-area {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 0 20px;
  /* will be adjusted by JS after header height measured */
}

/* ── CARD ── */
.card-scene { width: 100%; max-width: 420px; perspective: 1000px; }

.card-box {
  width: 100%;
  border-radius: 24px;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(.4,0,.2,1);
  position: relative;
  cursor: pointer;
  user-select: none;
}
.card-box.flipped { transform: rotateY(180deg); }

.card-face {
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 24px;
  border: 0.5px solid var(--border);
  padding: 40px 32px 36px;
  display: flex; flex-direction: column;
  justify-content: space-between;
  min-height: 320px;
}
.card-front {
  background: var(--surface);
}
.card-back {
  background: var(--surface2);
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  transform: rotateY(180deg);
}

/* card content */
.card-type-badge {
  display: inline-block;
  font-size: 11px; font-weight: 500; letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px;
  background: var(--accent-dim);
  color: var(--accent);
  align-self: flex-start;
  margin-bottom: 28px;
}
.card-type-badge.person { background: rgba(100,180,255,0.1); color: #64b4ff; }
.card-type-badge.verb   { background: rgba(100,220,160,0.1); color: #64dcA0; }

.card-en {
  font-family: 'Playfair Display', serif;
  font-size: 38px; font-weight: 500;
  line-height: 1.2; color: var(--text);
  flex: 1; display: flex; align-items: center;
  word-break: break-word;
}
.card-hint {
  font-size: 13px; color: var(--text3);
  text-align: center; margin-top: 28px;
  letter-spacing: 0.3px;
}

/* back face */
.card-en-small {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 500;
  color: var(--text2); margin-bottom: 16px;
}
.card-tr {
  font-size: 34px; font-weight: 400;
  line-height: 1.3; color: var(--text);
  font-family: 'Playfair Display', serif;
  flex: 1; display: flex; align-items: center;
  word-break: break-word;
}

/* ── KNOWN BADGE ── */
.known-mark {
  position: absolute; top: 16px; right: 16px; z-index: 10;
  width: 32px; height: 32px; border-radius: 50%;
  border: 0.5px solid var(--border);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer;
  transition: all 0.2s;
  color: transparent;
}
.card-scene.known .known-mark {
  background: var(--green-dim);
  border-color: rgba(76,217,100,0.4);
  color: var(--green);
}

/* ── BOTTOM CONTROLS ── */
.controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 0 20px env(safe-area-inset-bottom, 20px);
  background: var(--bg);
  border-top: 0.5px solid var(--border);
}
.controls-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0;
  gap: 12px;
}
.nav-btn {
  width: 56px; height: 56px; border-radius: 50%;
  border: 0.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
}
.nav-btn:active { transform: scale(0.92); background: var(--surface2); }
.nav-btn:disabled { opacity: 0.2; }

.know-btn-main {
  flex: 1; height: 56px; border-radius: 28px;
  border: 0.5px solid var(--border);
  background: var(--surface);
  color: var(--text2); font-size: 15px; font-weight: 400;
  cursor: pointer; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.2px;
}
.know-btn-main.known-active {
  background: var(--green-dim);
  border-color: rgba(76,217,100,0.4);
  color: var(--green);
}
.know-btn-main:active { transform: scale(0.97); }

/* ── EMPTY ── */
.empty-screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 40px;
  display: none;
}
.empty-screen.show { display: flex; }
.empty-emoji { font-size: 64px; }
.empty-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 500; color: var(--text);
  text-align: center;
}
.empty-sub { font-size: 15px; color: var(--text2); text-align: center; line-height: 1.5; }
.reset-btn {
  margin-top: 8px; padding: 14px 32px; border-radius: 28px;
  background: var(--accent-dim); border: 0.5px solid rgba(212,168,83,0.4);
  color: var(--accent); font-size: 15px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

/* ── SWIPE ANIMATION ── */
.card-scene {
  transition: opacity 0.18s, transform 0.18s;
}
.card-scene.exit-left  { opacity: 0; transform: translateX(-60px); }
.card-scene.exit-right { opacity: 0; transform: translateX(60px); }
.card-scene.enter      { opacity: 0; transform: translateY(16px); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="header">
  <div class="header-row">
    <div class="app-title">Crime <em>&</em> Law</div>
    <div class="counter"><b id="cur">1</b> / <b id="tot">1</b></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-fill" id="prog"></div>
  </div>
  <div class="filters">
    <button class="ftab active" onclick="setFilter('all',this)">Tümü</button>
    <button class="ftab" onclick="setFilter('crime',this)">Suçlar</button>
    <button class="ftab" onclick="setFilter('person',this)">Kişiler</button>
    <button class="ftab" onclick="setFilter('verb',this)">Fiiller</button>
    <button class="ftab" onclick="setFilter('court',this)">Mahkeme</button>
    <button class="ftab" onclick="setFilter('unknown',this)">Bilinmeyenler</button>
  </div>
</div>

<!-- CARD -->
<div class="card-area" id="card-area">
  <div class="card-scene" id="card-scene">
    <button class="known-mark" id="known-mark" onclick="toggleKnown(event)"></button>
    <div class="card-box" id="card-box" onclick="flipCard()">
      <div class="card-face card-front" id="cf">
        <div class="card-type-badge" id="badge">Suç</div>
        <div class="card-en" id="c-en">—</div>
        <div class="card-hint">Türkçesi için dokun</div>
      </div>
      <div class="card-face card-back" id="cb">
        <div class="card-type-badge" id="badge2">Suç</div>
        <div class="card-en-small" id="c-en2">—</div>
        <div class="card-tr" id="c-tr">—</div>
      </div>
    </div>
  </div>
</div>

<!-- EMPTY -->
<div class="empty-screen" id="empty-screen">
  <div class="empty-emoji">🎉</div>
  <div class="empty-title">Tebrikler!</div>
  <div class="empty-sub">Bu kategorideki tüm<br>kelimeleri tamamladınız.</div>
  <button class="reset-btn" onclick="resetFilter()">Baştan Başla</button>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="controls-inner">
    <button class="nav-btn" id="btn-prev" onclick="go(-1)">←</button>
    <button class="know-btn-main" id="know-btn" onclick="toggleKnown(event)">Öğrendim ✓</button>
    <button class="nav-btn" id="btn-next" onclick="go(1)">→</button>
  </div>
</div>

<script>
const vocab = [
  {en:"Blackmail",tr:"Şantaj",type:"crime",cat:"crime"},
  {en:"Blackmailer",tr:"Şantajcı",type:"person",cat:"crime"},
  {en:"To blackmail",tr:"Şantaj yapmak",type:"verb",cat:"crime"},
  {en:"Bribery",tr:"Rüşvet",type:"crime",cat:"crime"},
  {en:"To bribe",tr:"Rüşvet vermek",type:"verb",cat:"crime"},
  {en:"Burglary",tr:"Haneye tecavüz / Ev hırsızlığı",type:"crime",cat:"crime"},
  {en:"Burglar",tr:"Ev hırsızı",type:"person",cat:"crime"},
  {en:"To break in / To burgle",tr:"Zorla girmek / Ev soymak",type:"verb",cat:"crime"},
  {en:"Drug dealing",tr:"Uyuşturucu ticareti",type:"crime",cat:"crime"},
  {en:"Drug dealer",tr:"Uyuşturucu satıcısı",type:"person",cat:"crime"},
  {en:"To sell drugs",tr:"Uyuşturucu satmak",type:"verb",cat:"crime"},
  {en:"Fraud",tr:"Dolandırıcılık",type:"crime",cat:"crime"},
  {en:"Fraudster",tr:"Dolandırıcı",type:"person",cat:"crime"},
  {en:"To commit fraud",tr:"Dolandırıcılık yapmak",type:"verb",cat:"crime"},
  {en:"Hacking",tr:"Bilgisayar korsanlığı",type:"crime",cat:"crime"},
  {en:"Hacker",tr:"Bilgisayar korsanı",type:"person",cat:"crime"},
  {en:"To hack (into)",tr:"Sisteme sızmak / Hacklemek",type:"verb",cat:"crime"},
  {en:"Hijacking",tr:"Araç / Uçak kaçırma",type:"crime",cat:"crime"},
  {en:"Hijacker",tr:"Hava korsanı",type:"person",cat:"crime"},
  {en:"To hijack",tr:"Araç kaçırmak",type:"verb",cat:"crime"},
  {en:"Kidnapping",tr:"Adam kaçırma",type:"crime",cat:"crime"},
  {en:"Kidnapper",tr:"Adam kaçıran kişi",type:"person",cat:"crime"},
  {en:"To kidnap",tr:"Adam kaçırmak",type:"verb",cat:"crime"},
  {en:"Mugging",tr:"Sokakta gasp / Kapkaç",type:"crime",cat:"crime"},
  {en:"Mugger",tr:"Gaspçı / Kapkaççı",type:"person",cat:"crime"},
  {en:"To mug",tr:"Gasp etmek",type:"verb",cat:"crime"},
  {en:"Murder",tr:"Cinayet",type:"crime",cat:"crime"},
  {en:"Murderer",tr:"Katil",type:"person",cat:"crime"},
  {en:"To murder",tr:"Cinayet işlemek / Öldürmek",type:"verb",cat:"crime"},
  {en:"Rape",tr:"Tecavüz",type:"crime",cat:"crime"},
  {en:"Rapist",tr:"Tecavüzcü",type:"person",cat:"crime"},
  {en:"To rape",tr:"Tecavüz etmek",type:"verb",cat:"crime"},
  {en:"Robbery",tr:"Soygun (banka, dükkan vb.)",type:"crime",cat:"crime"},
  {en:"Robber",tr:"Soyguncu",type:"person",cat:"crime"},
  {en:"To rob",tr:"Soygun yapmak / Soymak",type:"verb",cat:"crime"},
  {en:"Smuggling",tr:"Kaçakçılık",type:"crime",cat:"crime"},
  {en:"Smuggler",tr:"Kaçakçı",type:"person",cat:"crime"},
  {en:"To smuggle",tr:"Kaçakçılık yapmak",type:"verb",cat:"crime"},
  {en:"Stalking",tr:"Gizli takip / Taciz",type:"crime",cat:"crime"},
  {en:"Stalker",tr:"Tacizci takipçi",type:"person",cat:"crime"},
  {en:"To stalk",tr:"Gizlice takip etmek",type:"verb",cat:"crime"},
  {en:"Terrorism",tr:"Terörizm",type:"crime",cat:"crime"},
  {en:"Terrorist",tr:"Terörist",type:"person",cat:"crime"},
  {en:"To set off bombs",tr:"Bomba patlatmak",type:"verb",cat:"crime"},
  {en:"Theft",tr:"Hırsızlık (genel)",type:"crime",cat:"crime"},
  {en:"Thief",tr:"Hırsız",type:"person",cat:"crime"},
  {en:"To steal",tr:"Çalmak",type:"verb",cat:"crime"},
  {en:"Vandalism",tr:"Vandallık / Mala zarar verme",type:"crime",cat:"crime"},
  {en:"Vandal",tr:"Vandal (mala zarar veren kişi)",type:"person",cat:"crime"},
  {en:"To vandalize",tr:"Mala zarar vermek / Tahrip etmek",type:"verb",cat:"crime"},
  {en:"Commit",tr:"(Suç) işlemek",type:"verb",cat:"court"},
  {en:"Investigate",tr:"Soruşturmak / Araştırmak",type:"verb",cat:"court"},
  {en:"Catch",tr:"Yakalamak",type:"verb",cat:"court"},
  {en:"Arrest",tr:"Tutuklamak",type:"verb",cat:"court"},
  {en:"Question",tr:"Sorgulamak",type:"verb",cat:"court"},
  {en:"Charge",tr:"Suçlamak (resmi makamca)",type:"verb",cat:"court"},
  {en:"Court",tr:"Mahkeme",type:"crime",cat:"court"},
  {en:"Accused",tr:"Sanık / Suçlanan kişi",type:"person",cat:"court"},
  {en:"Acquitted",tr:"Beraat etmiş / Suçsuz bulunmuş",type:"crime",cat:"court"},
  {en:"Evidence / Proof",tr:"Kanıt / Delil",type:"crime",cat:"court"},
  {en:"Guilty",tr:"Suçlu",type:"crime",cat:"court"},
  {en:"Judge",tr:"Hakim",type:"person",cat:"court"},
  {en:"Jury",tr:"Jüri",type:"person",cat:"court"},
  {en:"Punishment",tr:"Ceza",type:"crime",cat:"court"},
  {en:"Sentenced",tr:"Mahkum edilmiş / Cezaya çarptırılmış",type:"crime",cat:"court"},
  {en:"Verdict",tr:"Karar (jürinin veya hakimin kararı)",type:"crime",cat:"court"},
  {en:"Witnesses",tr:"Görgü tanıkları",type:"person",cat:"court"},
];

let known = new Set(JSON.parse(localStorage.getItem('cv_known')||'[]'));
let activeFilter = 'all';
let deck = [];
let idx = 0;
let isFlipped = false;
let animating = false;

// swipe
let touchStartX = 0, touchStartY = 0;

function saveKnown() { localStorage.setItem('cv_known', JSON.stringify([...known])); }

function typeLabel(t) {
  if (t==='crime') return 'Suç';
  if (t==='person') return 'Kişi';
  return 'Fiil';
}
function typeClass(t) {
  if (t==='person') return 'person';
  if (t==='verb') return 'verb';
  return '';
}

function buildDeck() {
  if (activeFilter === 'all') deck = vocab.map((_,i)=>i);
  else if (activeFilter === 'court') deck = vocab.map((_,i)=>i).filter(i=>vocab[i].cat==='court');
  else if (activeFilter === 'unknown') deck = vocab.map((_,i)=>i).filter(i=>!known.has(i));
  else deck = vocab.map((_,i)=>i).filter(i=>vocab[i].type===activeFilter);
  idx = 0;
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildDeck();
  isFlipped = false;
  showCard(true);
}

function showCard(instant) {
  const empty = document.getElementById('empty-screen');
  const area = document.getElementById('card-area');
  const controls = document.querySelector('.controls');

  if (!deck.length) {
    empty.classList.add('show');
    area.style.display = 'none';
    controls.style.display = 'none';
    return;
  }
  empty.classList.remove('show');
  area.style.display = 'flex';
  controls.style.display = 'block';

  const w = vocab[deck[idx]];
  const isK = known.has(deck[idx]);

  // update content
  document.getElementById('c-en').textContent = w.en;
  document.getElementById('c-en2').textContent = w.en;
  document.getElementById('c-tr').textContent = w.tr;

  const bl = typeLabel(w.type), bc = typeClass(w.type);
  ['badge','badge2'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = bl;
    el.className = 'card-type-badge ' + bc;
  });

  // known state
  const scene = document.getElementById('card-scene');
  scene.classList.toggle('known', isK);
  document.getElementById('known-mark').textContent = isK ? '✓' : '';
  const kb = document.getElementById('know-btn');
  kb.textContent = isK ? '✓ Öğrendim' : 'Öğrendim ✓';
  kb.classList.toggle('known-active', isK);

  // flip state
  document.getElementById('card-box').classList.toggle('flipped', isFlipped);

  // counter & progress
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('tot').textContent = deck.length;
  document.getElementById('prog').style.width = ((idx+1)/deck.length*100)+'%';

  // nav buttons
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === deck.length - 1;

  // entrance animation
  if (!instant) {
    scene.classList.add('enter');
    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ scene.classList.remove('enter'); }); });
  }

  // adjust card-area top padding
  adjustLayout();
}

function adjustLayout() {
  const h = document.getElementById('header').offsetHeight;
  const ch = document.querySelector('.controls').offsetHeight;
  const area = document.getElementById('card-area');
  area.style.paddingTop = (h + 16) + 'px';
  area.style.paddingBottom = (ch + 16) + 'px';
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-box').classList.toggle('flipped', isFlipped);
}

function go(dir) {
  if (animating) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= deck.length) return;
  animating = true;
  isFlipped = false;
  const scene = document.getElementById('card-scene');
  scene.classList.add(dir > 0 ? 'exit-left' : 'exit-right');
  setTimeout(() => {
    scene.classList.remove('exit-left','exit-right');
    idx = newIdx;
    showCard(false);
    animating = false;
  }, 180);
}

function toggleKnown(e) {
  e.stopPropagation();
  const i = deck[idx];
  if (known.has(i)) known.delete(i);
  else known.add(i);
  saveKnown();
  const isK = known.has(i);
  const scene = document.getElementById('card-scene');
  scene.classList.toggle('known', isK);
  document.getElementById('known-mark').textContent = isK ? '✓' : '';
  const kb = document.getElementById('know-btn');
  kb.textContent = isK ? '✓ Öğrendim' : 'Öğrendim ✓';
  kb.classList.toggle('known-active', isK);
  if (activeFilter === 'unknown' && isK) {
    setTimeout(() => { buildDeck(); showCard(false); }, 500);
  }
}

function resetFilter() {
  known.clear(); saveKnown();
  buildDeck(); showCard(true);
}

// Swipe support
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    go(dx < 0 ? 1 : -1);
  }
}, {passive:true});

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

window.addEventListener('resize', adjustLayout);

buildDeck();
showCard(true);
</script>
</body>
</html>
