<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Fill-in-the-Blank Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8001d;
    --dark-red: #a00015;
    --black: #0a0a0a;
    --dark: #111111;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #888;
    --gold: #f0c040;
    --green: #00d066;
    --correct: #00d066;
    --wrong: #e8001d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* Header */
  header {
    background: var(--dark);
    border-bottom: 3px solid var(--red);
    padding: 24px 20px 18px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), var(--gold), var(--red), transparent);
  }

  .header-tag {
    display: inline-block;
    background: var(--red);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 3px 12px;
    margin-bottom: 10px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    letter-spacing: 4px;
    line-height: 0.95;
    color: #fff;
  }

  h1 span {
    color: var(--red);
    display: block;
  }

  .subtitle {
    margin-top: 8px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 16px 20px;
    background: #0d0d0d;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .score-item {
    text-align: center;
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .score-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .score-val.correct { color: var(--green); }
  .score-val.wrong   { color: var(--red); }
  .score-val.total   { color: var(--gold); }

  /* Progress bar */
  .progress-wrap {
    height: 4px;
    background: var(--border);
    position: relative;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--gold));
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* Main container */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 16px 80px;
    position: relative;
    z-index: 1;
  }

  /* Category pills */
  .cat-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .cat-tab {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    cursor: pointer;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    transition: all 0.2s;
    border: none;
  }

  .cat-tab:hover, .cat-tab.active {
    background: var(--red);
    color: #fff;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    padding: 28px 24px 24px;
    margin-bottom: 20px;
    position: relative;
    animation: slideIn 0.4s cubic-bezier(.4,0,.2,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--red);
    margin-bottom: 12px;
  }

  .sentence {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .sentence-tr {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 20px;
    line-height: 1.5;
    padding-left: 2px;
    border-left: 2px solid var(--border);
    padding-left: 10px;
  }

  .blank {
    display: inline-block;
    min-width: 110px;
    border-bottom: 2px solid var(--red);
    color: var(--red);
    font-weight: 700;
    text-align: center;
    padding: 0 4px;
    transition: all 0.3s;
    position: relative;
  }

  .blank.filled-correct {
    color: var(--green);
    border-bottom-color: var(--green);
    animation: pop 0.3s cubic-bezier(.4,0,.2,1);
  }

  .blank.filled-wrong {
    color: var(--wrong);
    border-bottom-color: var(--wrong);
    animation: shake 0.4s;
  }

  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-5px); }
    75%      { transform: translateX(5px); }
  }

  /* Meaning options */
  .meanings-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .meanings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px;
  }

  .meaning-btn {
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 11px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.18s;
    clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
    line-height: 1.3;
  }

  .meaning-btn:hover:not(:disabled) {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    transform: translateX(3px);
  }

  .meaning-btn.correct-ans {
    background: rgba(0,208,102,0.15);
    border-color: var(--green);
    color: var(--green);
  }

  .meaning-btn.wrong-ans {
    background: rgba(232,0,29,0.15);
    border-color: var(--red);
    color: var(--red);
  }

  .meaning-btn:disabled {
    cursor: not-allowed;
    opacity: 0.6;
  }

  .meaning-btn .tr {
    display: block;
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 2px;
  }

  .meaning-btn.correct-ans .tr,
  .meaning-btn.wrong-ans .tr {
    color: inherit;
    opacity: 0.7;
  }

  /* Result badge */
  .result-badge {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
  }

  .result-badge.show { display: block; }
  .result-badge.ok   { background: rgba(0,208,102,0.15); color: var(--green); border-left: 3px solid var(--green); }
  .result-badge.no   { background: rgba(232,0,29,0.12);  color: var(--red);   border-left: 3px solid var(--red); }

  .result-badge .tr { color: inherit; opacity: 0.75; font-weight: 400; font-style: italic; }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 28px;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.2s;
    border: none;
  }

  .btn-primary { background: var(--red); color: #fff; }
  .btn-primary:hover { background: #ff1a35; transform: translateY(-2px); }

  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }

  /* Final screen */
  #final-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
    animation: slideIn 0.5s ease;
  }

  #final-screen.show { display: block; }

  .final-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, var(--red), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .final-msg {
    font-size: 18px;
    color: var(--muted);
    margin: 10px 0 30px;
  }

  /* All questions view */
  #all-questions { display: block; }

  /* Responsive */
  @media (max-width: 500px) {
    .meanings-grid { grid-template-columns: 1fr; }
    .sentence { font-size: 15px; }
  }
</style>
</head>

<header>

</main>

    meaning: 'to stop someone from speaking',

    distractors: [

  },
  {

    distractors: [

  },
  {

    sentence: 'Supporters of free speech argue that cancel culture threatens _____ of expression.',
    sentenceTR: 'Özgür söylemin savunucuları, iptal kültürünün ifade özgürlüğünü tehdit ettiğini savunuyor.',
    meaning: 'the right to speak or act freely',
    meaningTR: 'özgürce konuşma veya hareket etme hakkı',
    distractors: [
      { en: 'treating people equally', tr: 'insanlara eşit davranmak' },
      { en: 'the results of an action', tr: 'bir eylemin sonuçları' },
      { en: 'a strong effect on something', tr: 'bir şey üzerinde güçlü etki' },
    ]
  },
  {
    cat: 'cancel',
    word: 'apologize',
    wordTR: 'özür dilemek',
    sentence: 'The celebrity refused to _____ despite the massive online backlash against her comments.',
    sentenceTR: 'Ünlü kişi, yorumlarına yönelik büyük çevrimiçi tepkiye rağmen özür dilemeyı reddetti.',
    meaning: 'to say sorry for something you did',
    meaningTR: 'yaptığın bir şey için özür dilemek',
    distractors: [
      { en: 'to form an opinion quickly', tr: 'hızla fikir oluşturmak' },
      { en: 'to stop someone from speaking', tr: 'birini susturmak' },
      { en: 'to react more strongly than needed', tr: 'gereğinden güçlü tepki vermek' },
    ]
  },
  {
    cat: 'cancel',
    word: 'impact',
    wordTR: 'etki / sonuç',
    sentence: 'A single trending hashtag can have a huge _____ on a celebrity\'s entire career.',
    sentenceTR: 'Trend olan tek bir hashtag, bir ünlünün tüm kariyeri üzerinde büyük bir etki yaratabilir.',

    meaningTR: 'bir şey üzerinde güçlü etki',
    distractors: [
      { en: 'the responsibility for one\'s actions', tr: 'eylemlerinin sorumluluğu' },
      { en: 'the beliefs of the general public', tr: 'genel kamuoyunun inançları' },
      { en: 'an unfair preference for one side', tr: 'bir taraf için haksız tercih' },
    ]
  },
  {
    cat: 'cancel',
    word: 'public opinion',
    wordTR: 'kamuoyu',
    sentence: '_____ can shift overnight when a new scandal breaks on social media.',
    sentenceTR: 'Sosyal medyada yeni bir skandal patlak verdiğinde kamuoyu bir gecede değişebilir.',
    meaning: 'the beliefs of the general public',
    meaningTR: 'genel halkın inançları ve düşünceleri',
    distractors: [
      { en: 'the opinion people have about a person', tr: 'insanların bir kişi hakkındaki görüşü' },
      { en: 'the expression of disapproval', tr: 'onaylamama ifadesi' },
      { en: 'the right to speak or act freely', tr: 'özgürce konuşma veya hareket etme hakkı' },
    ]
  },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {};
let currentCat = 'all';
let scoreCorrect = 0;
let scoreWrong = 0;

function initState() {
  state = {};
  scoreCorrect = 0;
  scoreWrong = 0;
  questions.forEach((q, i) => {
    state[i] = { answered: false, correct: null };
  });
  updateScore();
}

// ─── RENDER ────────────────────────────────────────────────────────────────────
function getVisibleQuestions() {
  return questions.map((q, i) => ({ q, i }))
    .filter(({ q }) => currentCat === 'all' || q.cat === currentCat);
}

function buildMeanings(q, idx) {
  const allOpts = [
    { en: q.meaning, tr: q.meaningTR, isCorrect: true },
    ...q.distractors.map(d => ({ en: d.en, tr: d.tr, isCorrect: false }))
  ];
  // shuffle
  for (let i = allOpts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allOpts[i], allOpts[j]] = [allOpts[j], allOpts[i]];
  }
  return allOpts;
}

// Store shuffled options per question (stable across re-renders)
const cachedOpts = {};
questions.forEach((q, i) => {
  cachedOpts[i] = buildMeanings(q, i);
});

function renderAll() {
  const container = document.getElementById('all-questions');
  const visible = getVisibleQuestions();
  container.innerHTML = '';

  visible.forEach(({ q, i }, visIdx) => {
    const s = state[i];
    const opts = cachedOpts[i];

    // Build sentence with blank
    const blankClass = s.answered
      ? (s.correct ? 'blank filled-correct' : 'blank filled-wrong')
      : 'blank';
    const blankText = s.answered ? q.word.toUpperCase() : '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;';
    const sentenceHTML = q.sentence.replace('_____',
      `<span class="${blankClass}" id="blank-${i}">${blankText}</span>`);

    // Build sentence TR with word highlighted
    const sentenceTR_html = s.answered
      ? q.sentenceTR.replace(new RegExp(q.wordTR, 'i'), m => `<strong style="color:var(--gold)">${m}</strong>`)
      : q.sentenceTR;

    // Build option buttons
    let optsHTML = opts.map(opt => {
      let cls = 'meaning-btn';
      if (s.answered) {
        if (opt.isCorrect)       cls += ' correct-ans';
        else if (!opt.isCorrect && state[i].chosenWrong === (opt.en)) cls += ' wrong-ans';
      }
      const disabled = s.answered ? 'disabled' : '';
      return `<button class="${cls}" ${disabled}
                onclick="answer(${i}, ${opt.isCorrect}, '${opt.en.replace(/'/g,"\\'")}')">
                ${opt.en}
                <span class="tr">${opt.tr}</span>
              </button>`;
    }).join('');

    // Result badge
    let badgeHTML = '';
    if (s.answered) {
      if (s.correct) {
        badgeHTML = `<div class="result-badge ok show">✅ Doğru! — "<em>${q.word}</em>" (${q.wordTR}) <span class="tr">Anlam: ${q.meaning} / ${q.meaningTR}</span></div>`;
      } else {
        badgeHTML = `<div class="result-badge no show">❌ Yanlış. Doğru cevap: "<em>${q.word}</em>" (${q.wordTR}) <span class="tr">Anlam: ${q.meaning} / ${q.meaningTR}</span></div>`;
      }
    }

    const catLabel = q.cat === 'social' ? '📱 Sosyal Medya' : '🚫 Cancel Kültürü';

    container.innerHTML += `
      <div class="question-card" id="card-${i}" data-cat="${q.cat}">
        <div class="q-number">SORU ${visIdx + 1} / ${visible.length} &nbsp;·&nbsp; ${catLabel}</div>
        <div class="sentence">${sentenceHTML}</div>
        <div class="sentence-tr">🇹🇷 ${sentenceTR_html}</div>
        <div class="meanings-label">📖 Anlam seç — doğru kelimeyi bul:</div>
        <div class="meanings-grid">${optsHTML}</div>
        ${badgeHTML}
      </div>`;
  });

  updateProgressBar();
  checkAllDone();
}

function answer(idx, isCorrect, chosenEn) {
  if (state[idx].answered) return;
  state[idx].answered = true;
  state[idx].correct = isCorrect;
  if (!isCorrect) state[idx].chosenWrong = chosenEn;

  if (isCorrect) scoreCorrect++;
  else           scoreWrong++;

  updateScore();
  renderAll();

  // Scroll to card
  setTimeout(() => {
    const el = document.getElementById(`card-${idx}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function updateScore() {
  document.getElementById('s-correct').textContent = scoreCorrect;
  document.getElementById('s-wrong').textContent   = scoreWrong;
  const total = scoreCorrect + scoreWrong;
  document.getElementById('s-total').textContent   = total;
  document.getElementById('s-pct').textContent     = total > 0 ? Math.round((scoreCorrect/total)*100) + '%' : '—';
}

function updateProgressBar() {
  const visible = getVisibleQuestions();
  const answered = visible.filter(({ i }) => state[i].answered).length;
  const pct = visible.length > 0 ? (answered / visible.length) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function checkAllDone() {
  const visible = getVisibleQuestions();
  const allDone = visible.every(({ i }) => state[i].answered);
  if (allDone && visible.length > 0) {
    const correctInCat = visible.filter(({ i }) => state[i].correct).length;
    const pct = Math.round((correctInCat / visible.length) * 100);
    document.getElementById('final-pct').textContent = pct + '%';
    let msg = pct >= 80 ? '🏆 Mükemmel! Gerçekten çok iyi!' :
              pct >= 60 ? '👍 İyi iş! Biraz daha pratik yap.' :
                          '💪 Devam et! Tekrar çalışmak seni güçlendirir.';
    document.getElementById('final-msg').textContent = msg;
    document.getElementById('final-screen').classList.add('show');
  } else {
    document.getElementById('final-screen').classList.remove('show');
  }
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function showAll() {
  currentCat = 'all';
  document.querySelectorAll('.cat-tab').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
  });
  renderAll();
}

function restartQuiz() {
  // Re-shuffle options
  questions.forEach((q, i) => {
    cachedOpts[i] = buildMeanings(q, i);
  });
  document.getElementById('final-screen').classList.remove('show');
  initState();
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── INIT ──────────────────────────────────────────────────────────────────────
initState();
renderAll();
</script>
