<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Test</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
[data-theme="light"] {
  --bg:#fff8f5; --bg2:#ffffff; --border:#f0c8c0; --text:#3d1a1a; --muted:#9b6b6b;
  --accent:#c8355a; --gold:#b8860b; --green:#2e8b57; --red:#c0392b;
  --shadow:rgba(200,53,90,0.10); --card:#ffffff; --chip-bg:#fce8f0;
  --chip-hov:#f9c0d4; --chip-brd:#e8a0b8; --score-bg:#fff0ea;
  --hdr:linear-gradient(135deg,#fff0f5 0%,#ffe8f0 50%,#fff8f0 100%);
  --btn1-bg:#c8355a; --btn1-txt:#fff; --btn2-bg:#f0e0e8; --btn2-txt:#8b2040;
  --blank-c:#c8355a; --ok-c:#2e8b57; --no-c:#c0392b;
}
[data-theme="dark"] {
  --bg:#1a1018; --bg2:#22181f; --border:#4a2a38; --text:#f5dce8; --muted:#b08898;
  --accent:#e0607a; --gold:#d4a840; --green:#4ecb88; --red:#e05060;
  --shadow:rgba(0,0,0,0.4); --card:#2a1e25; --chip-bg:#3a2030;
  --chip-hov:#4a2840; --chip-brd:#6a3855; --score-bg:#2a1e25;
  --hdr:linear-gradient(135deg,#22141c 0%,#2a1820 50%,#201418 100%);
  --btn1-bg:#e0607a; --btn1-txt:#fff; --btn2-bg:#3a2030; --btn2-txt:#e8a0c0;
  --blank-c:#e0607a; --ok-c:#4ecb88; --no-c:#e05060;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;transition:background .3s,color .3s;}

/* HEADER */
header{background:var(--hdr);border-bottom:2px solid var(--border);padding:16px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--shadow);}
.hdr-inner{max-width:1240px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.title-block{flex:1;min-width:160px;}
h1{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(20px,3.5vw,32px);color:var(--accent);line-height:1.1;}
h1 b{font-style:normal;}
.sub{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.scores{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.sp{background:var(--score-bg);border:1.5px solid var(--border);border-radius:18px;padding:5px 13px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;}
.sp .n{font-size:17px;line-height:1;}
.sp .n.ok{color:var(--green);}
.sp .n.no{color:var(--red);}
.sp .n.pct{color:var(--accent);}
.theme-btn{background:var(--chip-bg);border:1.5px solid var(--chip-brd);color:var(--text);font-size:17px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.theme-btn:hover{transform:rotate(20deg) scale(1.1);}

/* PROGRESS */
.prog-wrap{height:5px;background:var(--border);}
#prog{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .5s ease;width:0%;border-radius:0 3px 3px 0;}

/* TOOLBAR */
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;}
.btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:7px 18px;border-radius:18px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .17s;}
.btn1{background:var(--btn1-bg);color:var(--btn1-txt);}
.btn1:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 3px 12px var(--shadow);}
.btn2{background:var(--btn2-bg);color:var(--btn2-txt);}
.btn2:hover{filter:brightness(.95);}

/* MAIN */
main{max-width:1240px;margin:0 auto;padding:24px 14px 60px;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;}

/* CARD */
.qcard{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:18px 16px 14px;box-shadow:0 2px 12px var(--shadow);transition:box-shadow .2s;animation:fadeUp .35s ease both;position:relative;overflow:hidden;}
.qcard:hover{box-shadow:0 5px 22px var(--shadow);}
.qcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:14px 14px 0 0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.qnum{font-size:10.5px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:9px;}

/* SENTENCE */
.sentence{font-size:15px;font-weight:700;line-height:1.7;margin-bottom:13px;color:var(--text);}
.blank{display:inline-block;min-width:88px;padding:1px 6px 2px;border-bottom:2.5px solid var(--blank-c);color:var(--blank-c);font-weight:800;font-size:15px;text-align:center;transition:color .25s,border-color .25s;vertical-align:bottom;line-height:1.4;}
.blank.ok{color:var(--ok-c);border-color:var(--ok-c);}
.blank.no{color:var(--no-c);border-color:var(--no-c);}
@keyframes popIn{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.blank.pop{animation:popIn .3s ease;}
.blank.shake{animation:shakeX .35s ease;}

/* CHIPS */
.chips-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.8px;color:var(--muted);margin-bottom:7px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{background:var(--chip-bg);border:1.5px solid var(--chip-brd);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:6px 14px;border-radius:18px;cursor:pointer;transition:all .17s;user-select:none;}
.chip:hover:not(:disabled){background:var(--chip-hov);border-color:var(--accent);color:var(--accent);transform:translateY(-2px);box-shadow:0 3px 9px var(--shadow);}
.chip:disabled{cursor:not-allowed;}
.chip.cok{background:rgba(46,139,87,.15);border-color:var(--green);color:var(--green);}
.chip.cno{background:rgba(192,57,43,.12);border-color:var(--red);color:var(--red);text-decoration:line-through;}

/* RESULT */
.result{margin-top:11px;padding:10px 12px;border-radius:9px;font-size:12.5px;font-weight:700;display:none;line-height:1.55;}
.result.show{display:block;}
.result.ok{background:rgba(46,139,87,.1);border-left:3.5px solid var(--green);color:var(--green);}
.result.no{background:rgba(192,57,43,.09);border-left:3.5px solid var(--red);color:var(--red);}
.result .mline{font-weight:600;color:var(--text);opacity:.8;font-size:11.5px;margin-top:3px;font-style:italic;}
.result .trline{font-weight:600;color:var(--muted);font-size:11.5px;margin-top:2px;}

/* FINISH */
#finish{display:none;background:var(--hdr);border:2px solid var(--border);border-radius:18px;padding:28px 20px;text-align:center;margin-bottom:24px;box-shadow:0 4px 20px var(--shadow);animation:fadeUp .5s ease;}
#finish.show{display:block;}
#finish h2{font-family:'Playfair Display',serif;font-size:clamp(26px,6vw,46px);color:var(--accent);}
#finish p{color:var(--muted);font-size:14px;margin-top:5px;}

@media(max-width:580px){.grid{grid-template-columns:1fr;}.hdr-inner{justify-content:center;text-align:center;}.theme-btn{margin-left:0;}}
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="title-block">
      <h1><b>Vocabulary</b> Test</h1>
      <div class="sub">Fill in the blank — boşluğu doldur</div>
    </div>
    <div class="scores">
      <div class="sp">✅ <span class="n ok" id="s-ok">0</span></div>
      <div class="sp">❌ <span class="n no" id="s-no">0</span></div>
      <div class="sp">🎯 <span class="n pct" id="s-pct">—</span></div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" id="tbtn">🌙</button>
  </div>
</header>

<div class="prog-wrap"><div id="prog"></div></div>

<div class="toolbar">
  <button class="btn btn2" onclick="doShuffle()">🔀 Karıştır</button>
  <button class="btn btn2" onclick="doClear()">🧹 Temizle</button>
  <button class="btn btn1" onclick="doRestart()">🔄 Yeniden Başla</button>
</div>

<main>
  <div id="finish">
    <h2 id="fscore">—</h2>
    <p id="fmsg">—</p>
  </div>
  <div class="grid" id="grid"></div>
</main>

<script>
const ALL = [
  { s:"The street was full of people. It was very ___.", sTR:"Sokak insanlarla doluydu. Çok ___ idi.", ans:"crowded", ansTR:"kalabalık", en:"having too many people in one place", tr:"bir arada çok fazla insan olan", opts:["crowded","calm","safe","portable"] },
  { s:"After the baby stopped crying, the room became ___.", sTR:"Bebek ağlamayı bırakınca oda ___ oldu.", ans:"peaceful", ansTR:"huzurlu / sakin", en:"calm and quiet, without noise or conflict", tr:"sessiz ve sakin, gürültüsüz", opts:["risky","peaceful","polluted","long-term"] },
  { s:"Hospitals, schools, and parks are public ___.", sTR:"Hastaneler, okullar ve parklar kamusal ___ dir.", ans:"facilities", ansTR:"tesisler", en:"buildings or services provided for public use", tr:"kamuya sunulan bina veya hizmetler", opts:["income","facilities","traffic","doubt"] },
  { s:"There are many cars on the road, so there is heavy ___.", sTR:"Yolda çok araba var, bu yüzden ___ yoğun.", ans:"traffic", ansTR:"trafik", en:"vehicles moving along roads", tr:"yollarda seyreden araçlar", opts:["security","opportunity","traffic","sacrifice"] },
  { s:"People who live in the same area are called a ___.", sTR:"Aynı bölgede yaşayan insanlara ___ denir.", ans:"community", ansTR:"topluluk / cemaat", en:"a group of people living in the same place", tr:"aynı yerde yaşayan insan grubu", opts:["community","income","infrastructure","risk"] },
  { s:"This bag is easy to carry. It is ___.", sTR:"Bu çanta taşıması kolay. ___ dir.", ans:"portable", ansTR:"taşınabilir", en:"easy to carry or move from place to place", tr:"kolayca taşınabilen veya yerinden alınabilen", opts:["suspicious","portable","permanent","polluted"] },
  { s:"Money that you earn from work is called ___.", sTR:"Çalışarak kazandığın paraya ___ denir.", ans:"income", ansTR:"gelir", en:"money received regularly from work", tr:"çalışmadan düzenli elde edilen para", opts:["income","passion","convenience","uncertainty"] },
  { s:"The bridge and roads are part of the city's ___.", sTR:"Köprü ve yollar şehrin ___ parçasıdır.", ans:"infrastructure", ansTR:"altyapı", en:"basic physical systems of a country or city", tr:"bir ülke veya şehrin temel fiziksel sistemleri", opts:["sacrifice","infrastructure","calm","security"] },
  { s:"Smoking is a harmful ___.", sTR:"Sigara içmek zararlı bir ___ dır.", ans:"substance", ansTR:"madde", en:"a material with specific properties", tr:"belirli özelliklere sahip bir madde", opts:["substance","facility","opportunity","dedication"] },
  { s:"I don't know what will happen tomorrow. I feel ___.", sTR:"Yarın ne olacağını bilmiyorum. ___ hissediyorum.", ans:"uncertain", ansTR:"belirsiz / kararsız", en:"not sure about what will happen", tr:"ne olacağından emin olmayan", opts:["stable","convenient","uncertain","safe"] },
  { s:"The guard checked everyone for ___.", sTR:"Güvenlik görevlisi herkesi ___ için kontrol etti.", ans:"security", ansTR:"güvenlik", en:"the state of being safe from danger", tr:"tehlikeden korunma durumu", opts:["security","passion","traffic jam","community"] },
  { s:"She has strong love for music. Music is her ___.", sTR:"Müziğe karşı güçlü bir sevgisi var. Müzik onun ___.", ans:"passion", ansTR:"tutku", en:"a very strong feeling of enthusiasm for something", tr:"bir şeye karşı çok güçlü heves duygusu", opts:["doubt","passion","pollution","risk"] },
  { s:"A job that lasts for many years is a ___ job.", sTR:"Uzun yıllar süren bir iş ___ bir iştir.", ans:"long-term", ansTR:"uzun vadeli", en:"lasting or relating to a long period of time", tr:"uzun bir zaman dilimiyle ilgili olan", opts:["portable","long-term","suspicious","crowded"] },
  { s:"He gave his time to help others. That was a big ___.", sTR:"Başkalarına yardım etmek için zamanını verdi. Bu büyük bir ___ idi.", ans:"sacrifice", ansTR:"fedakârlık", en:"giving up something valuable for others", tr:"başkaları için değerli bir şeyden vazgeçmek", opts:["sacrifice","income","convenience","facility"] },
  { s:"I am not sure if he is honest. I have some ___.", sTR:"Dürüst olup olmadığından emin değilim. Biraz ___ var içimde.", ans:"doubt", ansTR:"şüphe / kuşku", en:"a feeling of uncertainty about something", tr:"bir şey hakkında belirsizlik hissi", opts:["opportunity","peace","doubt","traffic"] },
  { s:"The air is dirty because of cars and factories. It is ___.", sTR:"Arabalar ve fabrikalar yüzünden hava kirli. ___.", ans:"polluted", ansTR:"kirlenmiş / kirli", en:"made dirty or harmful to the environment", tr:"çevre için kirli veya zararlı hale getirilmiş", opts:["safe","polluted","calm","stable"] },
  { s:"The city is quiet and safe; it is a ___ place.", sTR:"Şehir sessiz ve güvenli; ___ bir yer.", ans:"peaceful", ansTR:"huzurlu / sakin", en:"calm and free from disturbance", tr:"sakin ve rahatsızlıktan uzak", opts:["peaceful","risky","suspicious","portable"] },
  { s:"Online shopping is easy and saves time. It is very ___.", sTR:"Online alışveriş kolay ve zaman kazandırır. Çok ___ dir.", ans:"convenient", ansTR:"kullanışlı / pratik", en:"easy to use and fitting your needs well", tr:"kullanımı kolay ve ihtiyaçlara uyan", opts:["convenient","crowded","polluted","uncertain"] },
  { s:"Driving too fast is a big ___.", sTR:"Çok hızlı araba sürmek büyük bir ___ dir.", ans:"risk", ansTR:"risk / tehlike", en:"the possibility of danger or bad outcome", tr:"tehlike ya da kötü sonuç ihtimali", opts:["community","risk","passion","facility"] },
  { s:"She worked hard every day for her goal. She showed great ___.", sTR:"Her gün hedefi için çok çalıştı. Büyük bir ___ gösterdi.", ans:"dedication", ansTR:"adanmışlık / kararlılık", en:"working very hard and being committed to a goal", tr:"bir hedefe bağlı kalarak çok çalışmak", opts:["dedication","traffic","income","substance"] }
];

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

let questions=[], state={}, scoreOk=0, scoreNo=0;

function init(arr){
  questions = arr.map((q,i)=>({...q,id:i,_opts:shuffle(q.opts)}));
  state={}; scoreOk=0; scoreNo=0;
  updScore();
}

function render(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  questions.forEach((q,vi)=>{
    const st=state[q.id], done=!!st, isOk=done&&st.correct;
    const pts=q.s.split('___'), ptsTR=q.sTR.split('___');
    const blankTxt=done?q.ans:'&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;';
    const blankCls='blank'+(done?(isOk?' ok':' no'):'');

    const chips=q._opts.map(opt=>{
      let cls='chip';
      if(done){if(opt===q.ans)cls+=' cok';else if(st.chosen===opt)cls+=' cno';}
      return `<button class="${cls}"${done?' disabled':''} onclick="doAnswer(${q.id},'${opt.replace(/'/g,"\\'")}',this)">${opt}</button>`;
    }).join('');

    let res='';
    if(done){
      const cls=isOk?'ok':'no';
      const icon=isOk?'✅':'❌';
      const top=isOk
        ?`${icon} <strong>${q.ans}</strong> (${q.ansTR}) — doğru!`
        :`${icon} Seçtiğin: <em>${st.chosen}</em> — Doğru: <strong>${q.ans}</strong> (${q.ansTR})`;
      res=`<div class="result ${cls} show">
        ${top}
        <div class="mline">📖 ${q.en} / ${q.tr}</div>
        <div class="trline">🇹🇷 ${ptsTR[0]}<strong>${q.ansTR}</strong>${ptsTR[1]||''}</div>
      </div>`;
    }

    const card=document.createElement('div');
    card.className='qcard';
    card.style.animationDelay=(vi*.04)+'s';
    card.id='card-'+q.id;
    card.innerHTML=`
      <div class="qnum">SORU ${vi+1}</div>
      <div class="sentence">${pts[0]}<span class="${blankCls}" id="bl-${q.id}">${blankTxt}</span>${pts[1]||''}</div>
      <div class="chips-lbl">📝 Doğru kelimeyi seç:</div>
      <div class="chips">${chips}</div>
      ${res}`;
    g.appendChild(card);
  });
  updProg(); checkFinish();
}

function doAnswer(id,chosen){
  if(state[id])return;
  const q=questions.find(q=>q.id===id);
  const isOk=chosen===q.ans;
  state[id]={correct:isOk,chosen};
  if(isOk)scoreOk++;else scoreNo++;
  updScore(); render();
  setTimeout(()=>{
    const bl=document.getElementById('bl-'+id);
    if(bl){bl.classList.add(isOk?'pop':'shake');setTimeout(()=>bl.classList.remove('pop','shake'),400);}
  },20);
}

function updScore(){
  document.getElementById('s-ok').textContent=scoreOk;
  document.getElementById('s-no').textContent=scoreNo;
  const t=scoreOk+scoreNo;
  document.getElementById('s-pct').textContent=t>0?Math.round(scoreOk/t*100)+'%':'—';
}

function updProg(){
  const ans=Object.keys(state).length;
  document.getElementById('prog').style.width=(questions.length>0?(ans/questions.length*100):0)+'%';
}

function checkFinish(){
  const fin=document.getElementById('finish');
  if(Object.keys(state).length===questions.length&&questions.length>0){
    const pct=Math.round(scoreOk/questions.length*100);
    document.getElementById('fscore').textContent=pct+'%';
    document.getElementById('fmsg').textContent=
      pct>=85?'🏆 Mükemmel! Harika bir sonuç!':
      pct>=65?'👍 Güzel iş! Biraz daha pratik yap.':
              '💪 Daha fazla çalış — başarabilirsin!';
    fin.classList.add('show');
    fin.scrollIntoView({behavior:'smooth',block:'nearest'});
  }else fin.classList.remove('show');
}

function doShuffle(){
  questions=shuffle(questions).map(q=>({...q,_opts:shuffle(q.opts)}));
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function doClear(){
  state={}; scoreOk=0; scoreNo=0;
  questions.forEach(q=>{q._opts=shuffle(q.opts);});
  document.getElementById('finish').classList.remove('show');
  updScore(); render(); window.scrollTo({top:0,behavior:'smooth'});
}

function doRestart(){
  init(ALL);
  document.getElementById('finish').classList.remove('show');
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function toggleTheme(){
  const h=document.documentElement;
  const dark=h.dataset.theme==='dark';
  h.dataset.theme=dark?'light':'dark';
  document.getElementById('tbtn').textContent=dark?'🌙':'☀️';
}

init(ALL); render();
</script>
</body>
</html>
